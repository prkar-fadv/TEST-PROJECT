name: Build & Publish Golden Image (Packer → Azure SIG)

on:
  workflow_dispatch:
    inputs:
      image_sku:
        description: "Base OS image SKU (Oracle-Linux). Only override allowed."
        required: false
        default: "ol97-lvm-gen2"

permissions:
  id-token: write   # for OIDC
  contents: read

env:
  # Infra variables (adjust to your environment)
  AZ_SUBSCRIPTION_ID: ${{ secrets.AZ_SUBSCRIPTION_ID }}
  RG_NAME: "rg-hybrid-packer-sb"
  LOCATION: "eastus2"
  # IMPORTANT: Use a valid gallery name (no hyphens)
  GALLERY_NAME: "fa_hybrid_golden_images"
  GALLERY_DESC: "FA Hybrid Golden Images Registry"
  IMAGE_DEF: "fa-oel-9-golden"
  IMAGE_VERSION: "1.0.0"
  # Avoid Packer plugin rate-limit during `packer init`
  PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Azure login with OIDC (no secrets)
      - name: Azure login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZ_SUBSCRIPTION_ID }}
          # If your sub is in a sovereign cloud, add: environment: azureusgovernment
          # Reference: azure/login docs
          # https://github.com/Azure/login#readme
          # (supports OIDC via id-token) [4](https://developer.hashicorp.com/packer/integrations/hashicorp/azure/latest/components/builder/arm)

      # 2) Ensure the gallery exists (Bicep)
      - name: Deploy Bicep: compute gallery
        shell: bash
        run: |
          set -euxo pipefail
          az deployment group create \
            --resource-group "${RG_NAME}" \
            --template-file ./Infra/sig.bicep \
            --parameters @./Infra/sig.parameters.json \
            --parameters galleryName="${GALLERY_NAME}" location="${LOCATION}" galleryDescription="${GALLERY_DESC}"

      # 3) Ensure the image definition exists (idempotent)
      - name: Ensure image definition
        shell: bash
        run: |
          set -euxo pipefail
          if ! az sig image-definition show \
                -g "${RG_NAME}" \
                --gallery-name "${GALLERY_NAME}" \
                -i "${IMAGE_DEF}" >/dev/null 2>&1; then

            az sig image-definition create \
              -g "${RG_NAME}" \
              --gallery-name "${GALLERY_NAME}" \
              --gallery-image-definition "${IMAGE_DEF}" \
              --publisher "FA" \
              --offer "HybridOEL" \
              --sku "oel-9" \
              --os-type "Linux" \
              --os-state "Generalized" \
              --hyper-v-generation "V2" \
              --location "${LOCATION}"
          fi
          # CLI syntax and required flags:
          # https://learn.microsoft.com/azure/cli/azure/sig/image-definition#az_sig_image_definition_create [2](https://stackoverflow.com/questions/71051432/github-actions-azure-oidc-with-subject-value-for-any-branch)

      # 4) Setup Packer
      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: "latest"

      # 5) Run Packer with Azure CLI auth (no SP secrets needed)
      - name: Packer init/validate/build
        shell: bash
        env:
          # No ARM_CLIENT_ID/SECRET here because we use Azure CLI auth
          ARM_SUBSCRIPTION_ID: ${{ env.AZ_SUBSCRIPTION_ID }}
        run: |
          set -euxo pipefail
          # IMPORTANT: if your repo folder is 'Image' (capital I), use that casing:
          cd Image
          packer init fa-oel-9.pkr.hcl
          packer validate fa-oel-9.pkr.hcl
          packer build \
            -var "location=${LOCATION}" \
            -var "gallery_resource_group=${RG_NAME}" \
            -var "gallery_name=${GALLERY_NAME}" \
            -var "image_definition_name=${IMAGE_DEF}" \
            -var "image_version=${IMAGE_VERSION}" \
            -var "image_sku=${{ github.event.inputs.image_sku }}" \
            fa-oel-9.pkr.hcl
